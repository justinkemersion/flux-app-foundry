name: Dependency check

on:
  schedule:
    - cron: "0 9 * * 1"
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Generate report
        id: report
        continue-on-error: true
        run: node scripts/deps-report.mjs
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: dependency-report
          path: .local/deps-reports/
      - name: Write job summary
        if: always()
        run: |
          if [ -f .local/deps-reports/summary.md ]; then
            cat .local/deps-reports/summary.md >> "$GITHUB_STEP_SUMMARY"
          fi
      - name: Open or update tracking issue
        if: always() && github.event_name == 'schedule'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require("fs");
            const path = ".local/deps-reports/summary.md";
            const body = fs.existsSync(path)
              ? fs.readFileSync(path, "utf8")
              : "Dependency report could not be generated.";
            const title = "chore: weekly dependency report";
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: "open",
              labels: "dependencies",
              per_page: 5,
            });
            const existing = issues.find((i) => i.title === title);
            if (existing) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.number,
                body: `Updated ${new Date().toISOString().slice(0, 10)}\n\n${body}`,
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                labels: ["dependencies"],
                body: `${body}\n\n---\n_Auto-generated by dependency-check workflow. Do not auto-upgrade; follow \`_contract/dependency-policy.md\`._`,
              });
            }
